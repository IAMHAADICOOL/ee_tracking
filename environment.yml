name: ee-tracking
# Python 3.10 is deliberate: PyBullet ships prebuilt wheels for 3.10, so
# `pip install pybullet` is instant. On 3.12 there is no wheel and pip
# compiles from source (several minutes). SB3 + Gymnasium are also happiest
# on 3.10/3.11.
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      - pybullet==3.2.7
      - numpy>=1.24,<2.0
      - matplotlib>=3.7
      - imageio>=2.31
      - imageio-ffmpeg>=0.4.9
      # RL stack (used from Phase 3 onward)
      - gymnasium>=0.29
      - stable-baselines3>=2.3.0
      - torch>=2.2          # CUDA build auto-selected on your 4070 Ti
      - tensorboard>=2.15
